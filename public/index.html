<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charlie — Ghidul tău de învățare</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- ── LOGIN SCREEN ─────────────────────────────────────── -->
  <div id="login-screen" class="screen">
    <div class="login-card">
      <div class="charlie-avatar large">C</div>
      <h1 class="charlie-name">Charlie</h1>
      <p class="charlie-subtitle">Ghidul tău personal de învățare</p>
      <p class="login-description">
        Salut! Sunt Charlie, asistentul tău de la <strong>Engleza Britanică Academy</strong>. 
        Sunt aici să te motivez și să te ghidez în parcursul tău de învățare.
      </p>

      <div class="login-form">
        <label for="email-input">Adresa ta de email</label>
        <input
          id="email-input"
          type="email"
          placeholder="exemplu@email.com"
          autocomplete="email"
        />
        <button id="login-btn" class="btn-primary" onclick="handleLogin()">
          Începe
        </button>
        <div id="login-error" class="error-msg hidden"></div>
      </div>
    </div>
  </div>

  <!-- ── CHAT SCREEN ──────────────────────────────────────── -->
  <div id="chat-screen" class="screen hidden">
    <div class="chat-container">

      <!-- Header -->
      <div class="chat-header">
        <div class="charlie-avatar small">C</div>
        <div class="header-text">
          <span class="header-title">Charlie 🎓</span>
          <span class="header-subtitle">Ghidul tău personal</span>
        </div>
        <button class="logout-btn" onclick="handleLogout()" title="Deconectează-te">⎋</button>
      </div>

      <!-- Messages -->
      <div id="messages-area" class="messages-area">
        <div id="messages-list"></div>
        <div id="typing-indicator" class="typing-indicator hidden">
          <div class="typing-bubble">
            <div class="charlie-avatar tiny">C</div>
            <div class="typing-dots">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="chat-input-area">
        <textarea
          id="message-input"
          placeholder="Scrie un mesaj..."
          rows="1"
          onkeydown="handleKeyDown(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button id="send-btn" class="send-btn" onclick="handleSend()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>

    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
